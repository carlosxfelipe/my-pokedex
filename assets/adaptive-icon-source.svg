<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Sky Blue -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>

    <!-- Drop Shadow for the Pokeball -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-opacity="0.3" flood-color="#000000" />
    </filter>
  </defs>

  <!-- Solid Background WITHOUT Rounded Corners for Android Adaptive -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg-grad)" />

  <!-- Escalonamos a pokebola para 65% para que ela caiba 100% dentro da "Safe Zone" do Android (os 66% centrais) -->
  <g transform="translate(512, 512) scale(0.65)" filter="url(#shadow)">
    <!-- Base Black Outline -->
    <circle cx="0" cy="0" r="380" fill="#222224" />
    
    <!-- Red Top Half -->
    <path d="M -360 0 A 360 360 0 0 1 360 0 Z" fill="#EE1515" />
    
    <!-- White Bottom Half -->
    <path d="M -360 0 A 360 360 0 0 0 360 0 Z" fill="#FFFFFF" />
    
    <!-- Middle Black Band -->
    <rect x="-380" y="-35" width="760" height="70" fill="#222224" />
    
    <!-- Center Black Circle -->
    <circle cx="0" cy="0" r="110" fill="#222224" />
    
    <!-- Center White Button Base -->
    <circle cx="0" cy="0" r="80" fill="#FFFFFF" />
    
    <!-- Inner White Button -->
    <circle cx="0" cy="0" r="50" fill="#FFFFFF" stroke="#222224" stroke-width="12" />
    
    <!-- Highlight on top-left of the red half -->
    <ellipse cx="-160" cy="-200" rx="90" ry="40" fill="#FFFFFF" opacity="0.35" transform="rotate(-40 -160 -200)" />
    
    <!-- Highlight on the inner button -->
    <circle cx="-15" cy="-15" r="12" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>
